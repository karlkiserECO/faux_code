version: 2
description: |
  Canonical task suite used for cyclic build/test. Each task points at a goal
  the agent must accomplish in a tmpdir workspace, plus a check_script that
  exits 0 when the result is correct.

tasks:
  - id: hello_file
    description: Read an existing file and answer a question about it.
    setup_files:
      "README.md": |
        # demo
        The project codename is sapphire.
    goal: "Read README.md and tell me the project codename."
    expect_text_includes: ["sapphire"]
    allowed_tools: ["list_dir", "read_file"]
    max_steps: 5

  - id: write_python_script
    description: Write a small Python script and run it.
    goal: |
      Create a file `add.py` with a function `add(a, b)` that returns a+b, and
      a `__main__` block that prints `add(3, 4)`. Then run it with the python
      tool to confirm output is 7.
    expect_text_includes: ["7"]
    expect_files:
      add.py: ["def add", "3, 4"]
    allowed_tools: ["list_dir", "read_file", "write_file", "python"]
    max_steps: 10

  - id: search_and_summarize
    description: Use the web to answer a knowledge question.
    goal: "What is the FastAPI project? Use web_search to confirm, give a one-sentence answer."
    expect_text_includes_any: ["framework", "Python", "API"]
    allowed_tools: ["web_search", "web_fetch"]
    max_steps: 6

  - id: edit_existing_file
    description: Edit a specific line in an existing file.
    setup_files:
      "config.py": |
        DEBUG = False
        APP_NAME = "demo"
    goal: 'Change DEBUG = False to DEBUG = True in config.py, then read the file to confirm.'
    expect_files:
      config.py: ["DEBUG = True", "demo"]
    allowed_tools: ["list_dir", "read_file", "edit_file", "write_file"]
    max_steps: 8

  - id: fix_failing_test
    description: Find and fix a bug to make a test pass.
    setup_files:
      "math_utils.py": |
        def square(n):
            # Bug: returns n+2 instead of n*n
            return n + 2
      "test_math.py": |
        from math_utils import square

        def test_square():
            assert square(3) == 9, f"expected 9, got {square(3)}"

        if __name__ == "__main__":
            test_square()
            print("OK")
    goal: |
      Run `python3 test_math.py` (or use the python tool) to execute test_math.py.
      It will fail. Read both files, identify the bug in `square` in math_utils.py,
      fix it, and re-run the test to confirm it now prints OK.
    expect_text_includes_any: ["OK", "passed"]
    expect_files:
      math_utils.py: ["n * n", ]
    allowed_tools: ["list_dir", "read_file", "edit_file", "write_file", "shell", "python"]
    max_steps: 15

  - id: grep_and_explain
    description: Search the workspace for a symbol and explain its purpose.
    setup_files:
      "src/parser.py": |
        def tokenize(text):
            """Split text into tokens."""
            return text.split()

        def parse(tokens):
            return [t.lower() for t in tokens]
      "src/main.py": |
        from parser import tokenize, parse

        def run(text):
            return parse(tokenize(text))
      "README.md": |
        # demo

        Pipeline: tokenize -> parse.
    goal: |
      Use grep to find all uses of the `tokenize` function in the workspace,
      then briefly explain in one sentence what `tokenize` does.
    expect_text_includes_any: ["split", "token", "word"]
    allowed_tools: ["list_dir", "read_file", "grep"]
    max_steps: 10

  - id: multi_file_rename
    description: Rename a function across multiple files.
    setup_files:
      "src/utils.py": |
        def calc_total(items):
            return sum(items)
      "src/main.py": |
        from utils import calc_total

        print(calc_total([1, 2, 3]))
    goal: |
      Rename the function `calc_total` to `sum_items` in both `src/utils.py`
      and `src/main.py`. Read both files first, make the change in both, then
      run `python -c "import sys; sys.path.insert(0, 'src'); from main import *"` (it should run without error).
    expect_files:
      src/utils.py: ["def sum_items"]
      src/main.py: ["sum_items"]
    allowed_tools: ["list_dir", "read_file", "edit_file", "write_file", "grep", "shell", "python"]
    max_steps: 15

  - id: git_commit_workflow
    description: Initialize a git repo, stage a file, commit it, and use git_status.
    goal: |
      Initialize a git repository in the workspace using shell `git init`.
      Configure user with `git config user.email demo@example.com` and
      `git config user.name Demo`. Create a file `hello.py` containing
      `print("hello")`, stage and commit it with the message "first commit",
      then use the git_status tool to confirm the working tree is clean.
    expect_text_includes_any: ["clean", "nothing to commit", "branch"]
    expect_files:
      hello.py: ["hello"]
    allowed_tools: ["list_dir", "read_file", "write_file", "shell", "git_status", "git_log"]
    max_steps: 15

  - id: count_lines
    description: Quick computation via the python tool.
    setup_files:
      "data.txt": |
        alpha
        beta
        gamma
        delta
        epsilon
    goal: "How many lines are in data.txt? Use the python tool to count exactly."
    expect_text_includes: ["5"]
    allowed_tools: ["list_dir", "read_file", "python"]
    max_steps: 6
